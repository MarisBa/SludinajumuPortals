[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_22", "nginx"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=3000"